<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#06090f;font-family:'Exo 2',sans-serif;color:#c8d8f0;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,160,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,160,255,.03) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0}
header{position:relative;z-index:10;text-align:center;padding:20px 20px 6px}
header h1{font-family:'Share Tech Mono',monospace;font-size:clamp(12px,1.8vw,19px);
  letter-spacing:.22em;color:#00c8ff;text-shadow:0 0 18px rgba(0,200,255,.45);text-transform:uppercase}
header p{font-size:10px;color:#3a6a8b;letter-spacing:.14em;margin-top:3px;font-family:'Share Tech Mono',monospace}
.wrap{position:relative;z-index:1;width:100%;max-width:1400px;margin:0 auto;padding:6px 12px 30px}
svg{width:100%;height:auto;display:block}

/* VLAN zones */
.vlan-bg{fill-opacity:.07;stroke-width:1.2}
.v10-bg{fill:#2563eb;stroke:#2563eb}.v10-lbl{fill:#93c5fd}
.v20-bg{fill:#16a34a;stroke:#16a34a}.v20-lbl{fill:#86efac}
.v30-bg{fill:#0891b2;stroke:#0891b2}.v30-lbl{fill:#67e8f9}
.v40-bg{fill:#ea580c;stroke:#ea580c}.v40-lbl{fill:#fdba74}
.v50-bg{fill:#dc2626;stroke:#dc2626}.v50-lbl{fill:#fca5a5}
.v60-bg{fill:#7c3aed;stroke:#7c3aed}.v60-lbl{fill:#c4b5fd}
.v70-bg{fill:#ca8a04;stroke:#ca8a04}.v70-lbl{fill:#fde68a}

/* Nodes */
.nbox rect{stroke-width:1.2}
.n-fw rect   {fill:#0d1420;stroke:#e05c30;stroke-width:2}
.n-sw rect   {fill:#061828;stroke:#00c8ff;stroke-width:1.5}
.n-sw-dmz rect{fill:#1a0606;stroke:#fbbf24;stroke-width:1.5}
.n-inet rect {fill:#0a0a14;stroke:#555}
.n-cloud rect{fill:#0d0018;stroke:#a855f7;stroke-width:1.2;stroke-dasharray:6 3}
.n-v10 rect  {fill:#0a1030;stroke:#2563eb}
.n-v20 rect  {fill:#0a1a10;stroke:#16a34a}
.n-v30 rect  {fill:#061820;stroke:#0891b2}
.n-v40 rect  {fill:#1a0e06;stroke:#ea580c}
.n-v50 rect  {fill:#1a0606;stroke:#dc2626;stroke-width:1.5}
.n-v60 rect  {fill:#100818;stroke:#7c3aed}
.n-v70 rect  {fill:#181204;stroke:#ca8a04}

.lm{font-family:'Exo 2',sans-serif;font-size:10.5px;font-weight:600;fill:#d0e8ff}
.ls{font-family:'Share Tech Mono',monospace;font-size:8.5px;fill:#3a6a8b}
.lv{font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:600}
.ltag{font-family:'Share Tech Mono',monospace;font-size:7.5px}

/* ══ FLOWS ══ */
/* Green internal LAN */
.fl-green{stroke:#22c55e;stroke-width:1.8;fill:none;stroke-dasharray:9 5;
  opacity:0;animation:dash 1.6s linear infinite,fadein .7s var(--d,3s) forwards}
/* Blue VPN */
.fl-blue{stroke:#38bdf8;stroke-width:2;fill:none;stroke-dasharray:10 5;
  opacity:0;animation:dash 1.3s linear infinite,fadein .7s var(--d,3.5s) forwards}
/* Purple filtered external */
.fl-purple{stroke:#a855f7;stroke-width:2;fill:none;stroke-dasharray:9 5;
  opacity:0;animation:dash 1.1s linear infinite,fadein .7s var(--d,2.8s) forwards}
/* Attack red */
.fl-attack{stroke:#ef4444;stroke-width:2.2;fill:none;stroke-dasharray:10 6;
  animation:dash .5s linear infinite,attackfade 3s forwards}
/* DMZ flow — black/yellow alternating dashes */
.fl-dmz{stroke:#fbbf24;stroke-width:2;fill:none;
  stroke-dasharray:8 4 2 4;
  opacity:0;animation:dashdmz 1.2s linear infinite,fadein .7s var(--d,3.2s) forwards}
@keyframes dashdmz{to{stroke-dashoffset:-36}}

@keyframes dash{to{stroke-dashoffset:-28}}
@keyframes fadein{to{opacity:1}}
@keyframes attackfade{0%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* Redundancy */
.srv-fire{opacity:0;animation:fireloop 12s var(--d,8s) infinite}
.srv-ok  {opacity:0;animation:okloop   12s var(--d,8s) infinite}
@keyframes fireloop{0%{opacity:0}4%{opacity:1}45%{opacity:1}49%{opacity:0}100%{opacity:0}}
@keyframes okloop  {0%{opacity:0}50%{opacity:0}54%{opacity:1}96%{opacity:1}100%{opacity:0}}
.fl-failover{stroke:#22c55e;stroke-width:2;fill:none;stroke-dasharray:7 5;
  opacity:0;animation:dash 1s linear infinite,okloop 12s var(--d,8s) infinite}
.flame-anim{animation:flicker .35s ease-in-out infinite alternate;transform-origin:center}
@keyframes flicker{0%{opacity:.7;transform:scaleY(.92)}100%{opacity:1;transform:scaleY(1.1)}}
.check-anim{animation:ckpulse 1s ease-in-out infinite}
@keyframes ckpulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Warning pulse on pfSense entry */
.warn-pulse{animation:warnpulse 1.5s ease-in-out infinite}
@keyframes warnpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
</style>
</head>
